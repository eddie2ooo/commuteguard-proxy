<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommuteGuard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c10;--surface:#111318;--border:#1e222c;--accent:#f0c040;--danger:#ff4d4d;--warn:#ff9900;--ok:#4af0a0;--text:#e8eaf0;--muted:#5a6070;--card:#14171f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(240,192,64,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,192,64,0.03) 1px,transparent 1px);background-size:40px 40px}
  .container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 20px 40px}
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--accent)}
  .logo span{color:var(--text);opacity:.4}
  .clock{text-align:right;font-size:11px;color:var(--muted);line-height:1.6}
  .clock .time-big{font-size:20px;font-weight:500;color:var(--text);display:block;font-family:'Syne',sans-serif}
  .banner{border-radius:12px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
  .banner.danger{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3)}
  .banner.warn{background:rgba(255,153,0,.1);border:1px solid rgba(255,153,0,.3)}
  .banner.ok{background:rgba(74,240,160,.08);border:1px solid rgba(74,240,160,.25)}
  .banner-icon{font-size:28px;flex-shrink:0}
  .banner-label{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px}
  .banner.danger .banner-label{color:var(--danger)}
  .banner.warn .banner-label{color:var(--warn)}
  .banner.ok .banner-label{color:var(--ok)}
  .banner-sub{font-size:11px;color:var(--muted);line-height:1.5}
  .dot​​​​​​​​​​​​​​​​
